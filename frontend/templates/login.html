{% extends 'base.html' %}
{% block title %}YatraNepal | Sign In{% endblock %}
{% block content %}
<div class="container my-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card bg-dark-subtle border-secondary border-opacity-25 p-4 rounded-4 shadow-lg">
        <div class="text-center mb-4">
          <span class="badge bg-primary-subtle text-primary rounded-pill mb-2 px-3 py-1.5 fw-semibold">Access YatraNepal GIS</span>
          <h2 class="h3 fw-bold text-light mb-1" style="font-family:'DM Serif Display',Georgia,serif;">Sign In</h2>
          <p class="text-secondary small">Access route planning, weather forecasts, and risk ratings.</p>
        </div>

        {% if error %}
          <div class="alert alert-danger border-danger border-opacity-25 rounded-3 py-2 text-center small mb-3">
            {{ error }}
          </div>
        {% endif %}

        <form method="POST">
          {% csrf_token %}
          <div class="mb-3">
            <label for="email" class="form-label text-secondary small fw-semibold">Email / Username</label>
            <input type="text" name="email" id="email" required class="form-control bg-dark border-secondary border-opacity-50 text-light py-2 rounded-3" placeholder="email@example.com">
          </div>
          <div class="mb-4">
            <label for="password" class="form-label text-secondary small fw-semibold">Password</label>
            <input type="password" name="password" id="password" required class="form-control bg-dark border-secondary border-opacity-50 text-light py-2 rounded-3" placeholder="••••••••">
          </div>
          
          <button type="submit" class="btn btn-primary rounded-pill w-100 py-2.5 mb-3" style="background: linear-gradient(135deg, #6366f1, #4f46e5); border: 0;">Sign In</button>
        </form>

        <div class="text-center mt-3">
          <span class="text-secondary small">Don't have an account? </span>
          <a href="/signup/" class="text-primary small fw-semibold text-decoration-none">Sign Up</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
