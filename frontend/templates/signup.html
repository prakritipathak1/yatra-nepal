{% extends 'base.html' %}
{% block title %}YatraNepal | Sign Up{% endblock %}
{% block content %}
<div class="container my-5">
  <div class="row justify-content-center">
    <div class="col-md-7 col-lg-6">
      <div class="card bg-dark-subtle border-secondary border-opacity-25 p-4 rounded-4 shadow-lg">
        <div class="text-center mb-4">
          <span class="badge bg-primary-subtle text-primary rounded-pill mb-2 px-3 py-1.5 fw-semibold">Join YatraNepal GIS</span>
          <h2 class="h3 fw-bold text-light mb-1" style="font-family:'DM Serif Display',Georgia,serif;">Create Account</h2>
          <p class="text-secondary small">Compare safety metrics and plan routes across Nepal.</p>
        </div>

        {% if error %}
          <div class="alert alert-danger border-danger border-opacity-25 rounded-3 py-2 text-center small mb-3">
            {{ error }}
          </div>
        {% endif %}

        <form method="POST">
          {% csrf_token %}
          <div class="row g-3 mb-3">
            <div class="col-md-6">
              <label for="name" class="form-label text-secondary small fw-semibold">Full Name</label>
              <input type="text" name="name" id="name" required class="form-control bg-dark border-secondary border-opacity-50 text-light py-2 rounded-3" placeholder="John Doe">
            </div>
            <div class="col-md-6">
              <label for="email" class="form-label text-secondary small fw-semibold">Email Address</label>
              <input type="email" name="email" id="email" required class="form-control bg-dark border-secondary border-opacity-50 text-light py-2 rounded-3" placeholder="john@example.com">
            </div>
          </div>

          <div class="row g-3 mb-3">
            <div class="col-md-6">
              <label for="password" class="form-label text-secondary small fw-semibold">Password</label>
              <input type="password" name="password" id="password" required minlength="8" class="form-control bg-dark border-secondary border-opacity-50 text-light py-2 rounded-3" placeholder="••••••••">
            </div>
            <div class="col-md-6">
              <label for="phone" class="form-label text-secondary small fw-semibold">Phone Number</label>
              <input type="text" name="phone" id="phone" required class="form-control bg-dark border-secondary border-opacity-50 text-light py-2 rounded-3" placeholder="+977-98XXXXXXXX">
            </div>
          </div>

          <div class="row g-3 mb-3">
            <div class="col-md-6">
              <label for="home_city" class="form-label text-secondary small fw-semibold">Home City</label>
              <input type="text" name="home_city" id="home_city" required class="form-control bg-dark border-secondary border-opacity-50 text-light py-2 rounded-3" placeholder="Kathmandu">
            </div>
            <div class="col-md-6">
              <label for="nationality" class="form-label text-secondary small fw-semibold">Nationality</label>
              <input type="text" name="nationality" id="nationality" required class="form-control bg-dark border-secondary border-opacity-50 text-light py-2 rounded-3" placeholder="Nepali">
            </div>
          </div>

          <div class="mb-4">
            <label for="user_type" class="form-label text-secondary small fw-semibold">Traveler Type</label>
            <select name="user_type" id="user_type" required class="form-select bg-dark border-secondary border-opacity-50 text-light py-2 rounded-3">
              <option value="nepali">Nepali Traveler</option>
              <option value="foreign">Foreign Tourist</option>
            </select>
          </div>

          <div class="mb-4">
            <label for="signup_code" class="form-label text-secondary small fw-semibold">Signup Verification Code</label>
            <input type="text" name="signup_code" id="signup_code" required class="form-control bg-dark border-secondary border-opacity-50 text-light py-2 rounded-3" placeholder="Enter verification code">
          </div>

          <button type="submit" class="btn btn-primary rounded-pill w-100 py-2.5 mb-3" style="background: linear-gradient(135deg, #6366f1, #4f46e5); border: 0;">Create Account</button>
        </form>

        <div class="text-center mt-2">
          <span class="text-secondary small">Already have an account? </span>
          <a href="/login/" class="text-primary small fw-semibold text-decoration-none">Sign In</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
